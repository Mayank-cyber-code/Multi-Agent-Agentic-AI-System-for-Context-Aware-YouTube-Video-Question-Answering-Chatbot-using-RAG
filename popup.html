<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>YouTube Agentic AI</title>

  <style>
    body {
      font-family: Arial;
      width: 520px;
      height: 600px;
      margin: 0;
      display: flex;
      background: #f5f5f5;
    }

    /* ===== SIDEBAR ===== */
    #sidebar {
      width: 130px;
      background: #1e1e1e;
      color: white;
      padding: 10px;
      overflow-y: auto;
    }

    #sidebar h3 {
      font-size: 13px;
      margin-bottom: 10px;
      color: #ccc;
    }

    .session {
      background: #333;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      word-break: break-word;
    }

    .session:hover {
      background: #555;
    }

    /* ===== MAIN ===== */
    #main {
      flex: 1;
      padding: 14px;   /* 🔥 updated */
      display: flex;
      flex-direction: column;
    }

    #top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    #chat {
      background: white;
      border-radius: 8px;
      padding: 10px;
      height: 320px;   /* 🔥 updated */
      overflow-y: auto;
      border: 1px solid #ddd;
      margin-bottom: 10px;
    }

    .msg {
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .user {
      background: #d1e7dd;
      text-align: right;
    }

    .bot {
      background: #f8d7da;
      text-align: left;
    }

    input, textarea, button {
      width: 100%;
      margin-bottom: 8px;
      box-sizing: border-box;
      font-size: 13px;
    }

    textarea {
      resize: none;
      height: 90px;
      padding: 8px;
    }

    input {
      padding: 6px;
    }

    button {
      background: #4CAF50;
      color: white;
      border: none;
      padding: 10px;
      cursor: pointer;
      border-radius: 6px;
      font-weight: bold;
    }

    button:disabled {
      background: #ccc;
    }

    #status {
      font-size: 11px;
      margin-bottom: 6px;
      color: #555;
    }

    #logs {
      font-size: 10px;
      background: black;
      color: #0f0;
      padding: 6px;
      max-height: 70px;
      overflow-y: auto;
      border-radius: 6px;
    }
  </style>
</head>

<body>

  <!-- ===== SIDEBAR ===== -->
  <div id="sidebar">
    <h3>Chats</h3>
    <div id="sessionList"></div>
  </div>

  <!-- ===== MAIN ===== -->
  <div id="main">

    <div id="top-bar">
      <span id="user-email">Not logged in</span>
      <button id="logout-btn">Logout</button>
    </div>

    <button id="login-btn">Login with Google</button>

    <div id="status">Ready</div>

    <input id="youtube-url" placeholder="YouTube URL"/>

    <textarea id="question" placeholder="Ask something..."></textarea>

    <button id="ask-button" disabled>Ask</button>

    <div id="chat"></div>

    <div id="logs"></div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
